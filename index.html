<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>NIGGER</title>
</head>
<body>

<h1>Ronaldo on the top</h1>

<!-- Bild 1 -->
<img src="Döner.jpeg" alt="Bild 1" width="200">

<!-- Bild 2 (Mehrfach-Download) -->
<img id="downloadBild" src="Döner 2.jpeg" alt="Bild 2 - Klick mich" width="200" style="cursor:pointer;">

<!-- Bild 3 -->
<img src="Döner3.jpeg" alt="Bild 3" width="200">

<script>
document.getElementById("downloadBild").addEventListener("click", function() {
    const datei = "Döner 2.jpeg"; // Datei, die heruntergeladen wird
    const anzahl = 100;           // Anzahl der Downloads
    let delay = 0;                // Start-Verzögerung in ms

    for (let i = 0; i < anzahl; i++) {
        setTimeout(() => {
            const link = document.createElement("a");
            link.href = datei;
            // Jede Kopie bekommt einen eigenen Namen
            link.download = `Döner 2_${i+1}.jpeg`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }, delay);
        delay += 1000; // Abstand zwischen Downloads: 1 Sekunde
    }
});
</script>

</body>
</html>
